services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omnisaver}
      POSTGRES_USER: ${POSTGRES_USER:-omnisaver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bot:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.bot
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    profiles: ["apps"]

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    profiles: ["apps"]

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    profiles: ["apps"]

volumes:
  postgres_data:
  redis_data:
