services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../backups/postgres:/backups
    networks:
      - internal
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - internal
    logging: *default-logging

  bot:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.bot
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "omnisaver_bot", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ../../storage/downloads:/app/storage/downloads
    networks:
      - internal
      - public
    logging: *default-logging

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nfrom urllib.request import urlopen\nurlopen('http://127.0.0.1:8000/health', timeout=5).read()\nPY",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal
      - public
    logging: *default-logging

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "omnisaver_worker", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ../../storage/downloads:/app/storage/downloads
    networks:
      - internal
      - public
    logging: *default-logging

  cleanup-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    restart: "no"
    env_file:
      - ../../.env
    command: ["python", "-m", "omnisaver_worker", "cleanup-once"]
    profiles: ["maintenance"]
    volumes:
      - ../../storage/downloads:/app/storage/downloads
    networks:
      - internal
      - public
    logging: *default-logging

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
      - public
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    internal: true
  public:
